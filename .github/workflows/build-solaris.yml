name: Build (Solaris)

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on Solaris
        uses: vmactions/solaris-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -q --accept developer/versioning/git developer/gcc developer/build/cmake developer/build/gnu-make developer/build/pkg-config x11/library/mesa

          run: |
            # 64-bit dbus headers live under /usr/lib/64/pkgconfig on Solaris.
            export PKG_CONFIG_PATH=/usr/lib/64/pkgconfig

            git clone --depth 1 --branch release-3.2.10 https://github.com/libsdl-org/SDL.git SDL3-src
            cmake -S SDL3-src -B SDL3-build -G "Unix Makefiles" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF \
              -DSDL_KMSDRM=OFF
            cmake --build SDL3-build --parallel
            cmake --install SDL3-build

            export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/64/pkgconfig

            NCPU=$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
            CC=gcc CXX=g++ gmake -j$NCPU
            CC=gcc CXX=g++ gmake server -j$NCPU

            mkdir -p dist dist-ded
            cp build/release/heretic2r dist/
            cp -r build/release/base dist/
            cp /usr/local/lib/libSDL3.so.0 dist/
            cp SDL3-src/LICENSE.txt dist/LICENSE.SDL3.txt
            cp build/release/heretic2r-server dist-ded/
            cp -r build/release/base dist-ded/
            tar czf heretic2r-solaris-$(uname -m).tar.gz -C dist .
            tar czf heretic2r-server-solaris-$(uname -m).tar.gz -C dist-ded .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-solaris
          path: heretic2r-solaris-*.tar.gz

      - name: Upload dedicated server artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-server-solaris
          path: heretic2r-server-solaris-*.tar.gz
