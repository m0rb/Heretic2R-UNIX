name: Build (FreeBSD)

on:
  workflow_call:
  workflow_dispatch:


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
          - arch: arm64
          - arch: riscv64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y gmake gcc sdl3 pkgconf mesa-libs
          run: |
            gmake -j$(sysctl -n hw.ncpu)
            gmake server -j$(sysctl -n hw.ncpu)
            mkdir -p dist dist-ded
            cp build/release/heretic2r dist/
            cp -r build/release/base dist/
            cp build/release/heretic2r-server dist-ded/
            cp -r build/release/base dist-ded/
            tar czf heretic2r-freebsd-${{ matrix.arch }}.tar.gz -C dist .
            tar czf heretic2r-server-freebsd-${{ matrix.arch }}.tar.gz -C dist-ded .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-freebsd-${{ matrix.arch }}
          path: heretic2r-freebsd-${{ matrix.arch }}.tar.gz

      - name: Upload dedicated server artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-server-freebsd-${{ matrix.arch }}
          path: heretic2r-server-freebsd-${{ matrix.arch }}.tar.gz
