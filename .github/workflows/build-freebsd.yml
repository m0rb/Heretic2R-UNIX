name: Build (FreeBSD)

on:
  push:
    branches: [ main, unix ]
  pull_request:
    branches: [ main, unix ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y gmake gcc sdl3 pkgconf mesa-libs
          run: |
            gmake -j$(sysctl -n hw.ncpu)
            mkdir -p dist dist-ded
            cp build/release/heretic2r dist/
            cp -r build/release/base dist/
            cp build/release/heretic2r-server dist-ded/
            cp -r build/release/base dist-ded/
            tar czf heretic2r-freebsd.tar.gz -C dist .
            tar czf heretic2r-server-freebsd.tar.gz -C dist-ded .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-freebsd
          path: heretic2r-freebsd.tar.gz

      - name: Upload dedicated server artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-server-freebsd
          path: heretic2r-server-freebsd.tar.gz
