name: Build (Linux)

on:
  push:
    branches: [ main, unix ]
  pull_request:
    branches: [ main, unix ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            gcc \
            g++ \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            pkg-config

      - name: Build SDL3 from source
        run: |
          git clone --depth 1 --branch release-3.2.10 https://github.com/libsdl-org/SDL.git SDL3-src
          cmake -S SDL3-src -B SDL3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF
          cmake --build SDL3-build --parallel
          sudo cmake --install SDL3-build

      - name: Build
        run: make -j$(nproc)

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp build/release/heretic2r dist/
          cp -r build/release/base dist/

      - name: Create archive
        run: tar czf heretic2r-linux-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: heretic2r-linux-${{ matrix.arch }}
          path: heretic2r-linux-${{ matrix.arch }}.tar.gz
